  const confOpts=['高','中','低'].map(c=>`<label class="radio-opt"><input type="radio" name="evConf" value="${c}" ${v.confidence===c?'checked':''}>${c}</label>`).join('');
  document.getElementById('evModalBody').innerHTML=`
    <div class="form-group"><label class="form-label">论断 claim<span class="req">*</span></label>
      <textarea class="form-input ta" id="evClaim" placeholder="该条证据支持的结论">${esc(v.claim)}</textarea></div>
    <div class="form-group"><label class="form-label">原文句 evidence_sentence<span class="req">*</span></label>
      <textarea class="form-input ta" id="evSent" placeholder="原文中支撑该论断的句子">${esc(v.sentence)}</textarea></div>
    <div class="form-row">
      <div class="form-group" style="flex:1"><label class="form-label">来源章节</label>
        <select class="form-input" id="evSec">${secOpts}</select></div>
      <div class="form-group" style="flex:1"><label class="form-label">图 / 表</label>
        <input class="form-input" id="evFig" value="${escAttr(v.figure)}" placeholder="如 Figure 2A，可空"></div>
    </div>
    <div class="form-group"><label class="form-label">置信度</label>
      <div class="radio-group" id="evConfGroup">${confOpts}</div></div>
    <div class="form-group"><label class="form-label">备注</label>
      <input class="form-input" id="evNote" value="${escAttr(v.note)}" placeholder="抽取备注，可空"></div>`;
  document.getElementById('bd-ev').classList.add('open');
  setTimeout(()=>document.getElementById('evClaim')?.focus(),60);
}
function saveEv(){
  const claim=(document.getElementById('evClaim').value||'').trim();
  const sentence=(document.getElementById('evSent').value||'').trim();
  if(!claim){showT('请填写论断 claim','twrn');return;}
  if(!sentence){showT('请填写原文句','twrn');return;}
  const section=document.getElementById('evSec').value||'其他';
  const figure=(document.getElementById('evFig').value||'').trim();
  const note=(document.getElementById('evNote').value||'').trim();
  const confEl=document.querySelector('#evConfGroup input:checked');
  const confidence=confEl?confEl.value:'';
  if(_evEditUid){
    const e=STATE.evs.find(x=>x.uid===_evEditUid);
    if(e){
      e.claim=claim;e.sentence=sentence;e.section=section;e.figure=figure;e.note=note;e.confidence=confidence;
      // 当前用户的修改并入来源列表
      let mine=(e.sources||[]).find(s=>s.from===CUR_USER);
      if(mine){Object.assign(mine,{claim,sentence,section,confidence});}
      else{(e.sources=e.sources||[]).push({from:CUR_USER,claim,sentence,section,confidence});}
      STATE.confirmed['ev.'+e.uid]=false;
    }
    showT('证据已更新','tok');
  } else {
    const nu=uid();
    STATE.evs.push({uid:nu,claim,sentence,section,confidence,figure,note,docIdx:null,sources:[{from:CUR_USER,claim,sentence,section,confidence}]});
    showT('已新增证据','tok');
  }
  _evEditUid=null;
  closeM('bd-ev');
  buildRowIndex(); renderBody();
}

/* ══════════════════════════════════════════════════════════════
   RENDER ROW (field)
   ══════════════════════════════════════════════════════════════ */
function renderRow(rid){
  const def=ROW_INDEX[rid]; if(!def) return '';
  const conf=STATE.confirmed[rid];
  const val=getVal(rid);
  const ro=isReadOnly();
  const editing=!ro&&STATE.editing[rid];
  const locHtml=locCell(rid,ro);

  let valHtml='';
  if(editing){
    if(def.type==='radio'||def.type==='score'){
      const opts=def.type==='score'?['1','2','3']:def.opts;
      const grpCls=def.type==='score'?'radio-group score-group':'radio-group';
      valHtml=`<div class="${grpCls}">${opts.map(o=>`<label class="radio-opt"><input type="radio" name="r-${rid}" value="${escAttr(o)}" ${String(val)===String(o)?'checked':''} onchange="updateField('${rid}','${escAttr(o)}')">${esc(o)}</label>`).join('')}</div>`;
    } else if(def.type==='list'){
      const txt=(Array.isArray(val)?val:[]).join('\n');
      valHtml=`<div style="width:100%"><textarea class="ann-inp" rows="4" onchange="updateList('${rid}',this.value)" onblur="scheduleBlur('${rid}')" placeholder="每行一个值">${esc(txt)}</textarea><div class="list-hint">每行一个值，回车分隔；共 ${Array.isArray(val)?val.length:0} 项</div></div>`;
    } else if(def.type==='textarea'){
      valHtml=`<textarea class="ann-inp" rows="3" onchange="updateField('${rid}',this.value)" onblur="scheduleBlur('${rid}')">${esc(val)}</textarea>`;
    } else {
      valHtml=`<input class="ann-inp" value="${escAttr(val)}" onchange="updateField('${rid}',this.value)" onblur="scheduleBlur('${rid}')" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmField('${rid}');}">`;
    }
  } else {
    if(def.type==='list'&&def.flat){
      const arr=Array.isArray(val)?val:[];
      const joined=arr.join('、');
      const emptyClass=joined?'':'empty-val';
      const cursor=ro?'cursor:default':'cursor:text';
      const click=ro?'':` onclick="editField('${rid}')"`;
      valHtml=`<div class="ann-val-text ${emptyClass}" style="white-space:pre-wrap;line-height:1.6;${cursor}"${click}>${joined?esc(joined):'—'}</div>`;
    } else if(def.type==='list'){
      const arr=Array.isArray(val)?val:[];
      if(!arr.length){
        valHtml=`<div class="tags-wrap empty-val"${ro?'':` onclick="editField('${rid}')"`}>—</div>`;
      } else {
        valHtml=`<div class="tags-wrap"${ro?'':` onclick="editField('${rid}')"`}><div class="tags">${arr.map(x=>`<span class="tag" title="${escAttr(x)}">${esc(x)}</span>`).join('')}</div></div>`;
      }
    } else {
      const displayVal=(val===''||val==null)?'—':esc(val);
      const emptyClass=(val===''||val==null)?'empty-val':'';
      const textStyle=def.type==='textarea'?'align-items:flex-start;padding-top:8px;white-space:pre-wrap;line-height:1.6;':'';
      const cursor=ro?'cursor:default':'cursor:text';
      const click=ro?'':` onclick="editField('${rid}')"`;
      valHtml=`<div class="ann-val-text ${emptyClass}" style="${textStyle}${cursor}"${click}>${displayVal}</div>`;
    }
  }

  const srcBadge=buildSrcBadge(rid);
  const revPanel=buildRevPanel(rid);

  const actHtml=ro?'':(conf
    ?`<div class="ok-check" title="已确认"><svg viewBox="0 0 16 16" fill="none" stroke="var(--gn)" stroke-width="2.2" stroke-linecap="round"><path d="M3 8l3.5 3.5 6.5-6"/></svg></div>`
    :`<button class="btn-ok" onclick="confirmField('${rid}')">确认</button>`);

  return `<div class="ann-row${conf?' ok':''}${editing?' ing-editing':''}" id="row-${rid}">
    <div class="ann-loc">${locHtml}</div>
    <div class="ann-lbl" title="${escAttr(def.lbl)}">${esc(def.lbl)}</div>
    <div class="ann-val-wrap">${valHtml}</div>
    <div class="ann-src">${srcBadge}</div>
    <div class="ann-act">${actHtml}</div>
  </div>${revPanel}`;
}

/* ── multi-source badge + panel ─────────────────────────────── */
function buildSrcBadge(rid){
  const sources=REVIEW_SOURCES[rid]||[];
  if(!sources.length) return '<div style="width:26px"></div>';
  const first=sources[0];
  const hasDiff=sources.some(s=>valKey(s.val)!==valKey(first.val));
  return '<button class="src-badge '+(hasDiff?'diff':'ok')+'" onclick="event.stopPropagation();toggleSrc(\''+rid+'\')" data-tip="'+(hasDiff?'有分歧，点击查看':'来源一致，点击查看')+'">'+sources.length+'</button>';
}
function toggleSrc(rid){STATE.srcExpanded[rid]=!STATE.srcExpanded[rid];renderBody();}
function dispVal(v){if(Array.isArray(v))return v.length?v.join('、'):'';return v;}
function buildRevPanel(rid){
  const sources=REVIEW_SOURCES[rid]||[];
  if(!sources.length||!STATE.srcExpanded[rid]) return '';
  const def=ROW_INDEX[rid];
  const curKey=valKey(getVal(rid));
  const canAdopt=pageMode==='review';
  let html='<div class="rev-panel">';
  sources.forEach((s,i)=>{
    const isCurrent=valKey(s.val)===curKey;
    const dv=dispVal(s.val);
    const rowClass=isCurrent?' adopted':(canAdopt?' clickable':'');
    const rowClick=(canAdopt&&!isCurrent)?` onclick="adoptSrc('${rid}',${i})"`:'';
    const act=isCurrent?'<span class="rev-cur-tag">当前</span>':(canAdopt?`<button class="rev-adopt-btn" onclick="event.stopPropagation();adoptSrc('${rid}',${i})">采纳</button>`:'');
    html+='<div class="rev-panel-row'+rowClass+'"'+rowClick+'>'
      +'<div style="width:40px;flex-shrink:0"></div>'
      +'<div class="rev-col-from">'+revAvatar(s.from)+'</div>'
      +'<div class="rev-col-loc"></div>'
      +'<span class="rev-col-val'+(isCurrent?'':' diff')+'">'+(dv!==''?esc(dv):'<span style="color:var(--t4);font-weight:400">—</span>')+'</span>'
      +'<div class="rev-col-act">'+act+'</div>'
      +'</div>';
  });
  html+='</div>';
  return html;
}
function revAvatar(name){
  const label=name==='AI'?'AI':name.charAt(0);
  const colors={'AI':'#1E40AF','杨一':'#7C3AED','王二':'#B45309','李四':'#15803D'};
  return '<div class="rev-avatar" style="background:'+(colors[name]||'#6B7280')+'">'+label+'</div>';
}
function adoptSrc(rid,i){
  const sources=REVIEW_SOURCES[rid]||[]; const s=sources[i]; if(!s)return;
  setVal(rid,clone(s.val)); STATE.confirmed[rid]=false;
  renderBody(); showT('已采纳','tok');
}

/* ══════════════════════════════════════════════════════════════
   FIELD ACTIONS
   ══════════════════════════════════════════════════════════════ */
function editField(rid){
  if(pageMode!=='review')return;
  STATE.editing[rid]=true; STATE.confirmed[rid]=false;
  renderBody();
  setTimeout(()=>{const row=document.getElementById('row-'+rid);if(row){const inp=row.querySelector('input,textarea');if(inp){inp.focus();if(inp.select&&inp.tagName==='INPUT')inp.select();}}},30);
}
function updateField(rid,val){setVal(rid,val);STATE.confirmed[rid]=false;}
function updateList(rid,text){const arr=text.split('\n').map(s=>s.trim()).filter(s=>s.length);setVal(rid,arr);STATE.confirmed[rid]=false;}
let _blurTimer=null;
function scheduleBlur(rid){clearTimeout(_blurTimer);_blurTimer=setTimeout(()=>{delete STATE.editing[rid];renderBody();},150);}
function confirmField(rid){
  clearTimeout(_blurTimer);
  delete STATE.editing[rid];
  STATE.confirmed[rid]=true;
  STATE.srcExpanded[rid]=false;
  renderBody();
  setTimeout(()=>{const el=document.getElementById('row-'+rid);if(el){el.classList.add('row-flash');setTimeout(()=>el.classList.remove('row-flash'),950);}},10);
}

/* ══════════════════════════════════════════════════════════════
   LOCATE (multi-loc per row, drag-select supported)
   ══════════════════════════════════════════════════════════════ */
let pickingLoc=null, activeField=null, selectedLocId=null, dragState=null;
function isLocReadonly(){return pageMode!=='review';}
function getRowDef(rid){return ROW_INDEX[rid]||null;}
function ensureLocs(rid){
  if(!Array.isArray(STATE.locs[rid])){
    const def=getRowDef(rid);
    STATE.locs[rid]=(def&&def.loc)?[def.loc]:[];
  }
  return STATE.locs[rid];
}
function getLocsFor(rid){return ensureLocs(rid);}

function locCell(rid,readonly){
  const locs=getLocsFor(rid);
  const hasLocs=locs.length>0;
  const isPicking=pickingLoc&&pickingLoc.rid===rid;
  const isActive=activeField&&activeField.rid===rid;
  let html='';
  if(hasLocs){
    html+=`<button class="loc-btn loc-has${isActive?' on':''}" onclick="onLocCycle(event,'${rid}')" data-tip="${locs.length>1?'点击切换定位':'定位到原文'}">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="5.5" r="2.2"/><path d="M7 8c0 0-4 2.5-4 4.5h8c0-2-4-4.5-4-4.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;
  }
  if(!readonly){
    html+=`<button class="loc-btn loc-add${isPicking?' loc-active-pick':''}" onclick="onLocAddClick(event,'${rid}')" data-tip="${isPicking?'框选中 (Esc 取消)':'新增定位'}">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2v8M2 6h8"/></svg>
    </button>`;
  }
  if(!html)html='<div class="loc-empty"></div>';
  return html;
}
function onLocCycle(ev,rid){
  ev.stopPropagation();
  if(pickingLoc){cancelPickLoc();return;}
  const locs=getLocsFor(rid);
  if(locs.length===0)return;
  if(activeField&&activeField.rid===rid){activeField.idx=(activeField.idx+1)%locs.length;}
  else{activeField={rid,idx:0};}
  clearSelectedLoc();
  refreshLocHighlights();
}
function refreshLocHighlights(){
  document.querySelectorAll('.loc-show').forEach(el=>el.classList.remove('loc-show','loc-show-current'));
  if(!activeField){renderBody();return;}
  const locs=getLocsFor(activeField.rid);
  if(locs.length===0){activeField=null;renderBody();return;}
  if(activeField.idx>=locs.length)activeField.idx=0;
  let focusEl=null;
  locs.forEach((id,i)=>{
    const el=document.getElementById('loc-'+id);
    if(!el)return;
    el.classList.add('loc-show');
    if(i===activeField.idx){el.classList.add('loc-show-current');focusEl=el;}
  });
  if(focusEl)focusEl.scrollIntoView({behavior:'smooth',block:'center'});
  renderBody();
}
function selectLocForDelete(el){
  if(!el||!el.id||el.id.indexOf('loc-')!==0)return;
  clearSelectedLoc();
  selectedLocId=el.id.slice(4);
  el.classList.add('loc-selected');
  showLocDelBtn(el);
}
function clearSelectedLoc(){selectedLocId=null;document.querySelectorAll('.loc-selected').forEach(el=>el.classList.remove('loc-selected'));removeLocDelBtn();}
function showLocDelBtn(el){
  removeLocDelBtn();
  const page=el.closest('.pdf-page');if(!page)return;
  const pr=page.getBoundingClientRect(),er=el.getBoundingClientRect();
  const btn=document.createElement('button');
  btn.id='locDelBtn';btn.className='loc-del-btn';btn.title='删除定位 (Delete)';
  btn.innerHTML='<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M2 2l8 8M10 2L2 10"/></svg>';
  btn.style.left=(er.right-pr.left-9)+'px';btn.style.top=(er.top-pr.top-12)+'px';
  btn.onmousedown=ev=>ev.stopPropagation();
  btn.onclick=ev=>{ev.stopPropagation();deleteSelectedLoc();};
  page.appendChild(btn);
}
function removeLocDelBtn(){const b=document.getElementById('locDelBtn');if(b)b.remove();}
function deleteSelectedLoc(){
  if(!selectedLocId||!activeField)return;
  const id=selectedLocId, rid=activeField.rid;
  const arr=getLocsFor(rid); const i=arr.indexOf(id); if(i>=0)arr.splice(i,1);
  if(id.indexOf('auto-')===0){const el=document.getElementById('loc-'+id);if(el&&el.classList.contains('loc-overlay'))el.remove();}
  selectedLocId=null;removeLocDelBtn();
  const locs=getLocsFor(rid);
  if(locs.length===0)activeField=null;else if(activeField.idx>=locs.length)activeField.idx=0;
  refreshLocHighlights();
  showT('定位已删除','tinf');
}
function onLocAddClick(ev,rid){
  ev.stopPropagation();
  if(isLocReadonly())return;
  if(pickingLoc){cancelPickLoc();return;}
  startPickLoc(rid);
}
function startPickLoc(rid){
  pickingLoc={rid};
  document.body.classList.add('picking-loc');
  document.addEventListener('keydown',pickKeyHandler);
  clearSelectedLoc();
  const locs=getLocsFor(rid);
  if(locs.length>0){activeField={rid,idx:0};refreshLocHighlights();}
  else{activeField=null;document.querySelectorAll('.loc-show').forEach(el=>el.classList.remove('loc-show','loc-show-current'));renderBody();}
}
function cancelPickLoc(){
  if(dragState&&dragState.rect)dragState.rect.remove();
  dragState=null;pickingLoc=null;
  document.body.classList.remove('picking-loc');
  document.removeEventListener('keydown',pickKeyHandler);
  renderBody();
}
function onPdfMouseDown(e){
  if(!pickingLoc)return;
  const page=e.target.closest&&e.target.closest('.pdf-page');
  if(!page)return;
  e.preventDefault();e.stopPropagation();
  const pr=page.getBoundingClientRect();
  const sx=e.clientX-pr.left+page.scrollLeft, sy=e.clientY-pr.top+page.scrollTop;
  const r=document.createElement('div');r.className='pdf-drag-rect';
  r.style.left=sx+'px';r.style.top=sy+'px';r.style.width='0';r.style.height='0';
  page.appendChild(r);
  dragState={page,startX:sx,startY:sy,rect:r};
}
function onPdfMouseMove(e){
  if(!dragState)return;
  const pr=dragState.page.getBoundingClientRect();
  const cx=e.clientX-pr.left+dragState.page.scrollLeft, cy=e.clientY-pr.top+dragState.page.scrollTop;
  Object.assign(dragState.rect.style,{left:Math.min(dragState.startX,cx)+'px',top:Math.min(dragState.startY,cy)+'px',width:Math.abs(cx-dragState.startX)+'px',height:Math.abs(cy-dragState.startY)+'px'});
}
function onPdfMouseUp(e){
  if(!dragState)return;
  const r=dragState.rect;
  const w=parseFloat(r.style.width)||0, h=parseFloat(r.style.height)||0;
  if(w<8||h<8){r.remove();dragState=null;return;}
  const locId='auto-'+(_uid++)+'-'+w.toFixed(0);
  r.id='loc-'+locId;r.className='loc-overlay';
  const rid=pickingLoc.rid;
  getLocsFor(rid).push(locId);
  const locs=getLocsFor(rid);
  pickingLoc=null;document.body.classList.remove('picking-loc');document.removeEventListener('keydown',pickKeyHandler);
  activeField={rid,idx:locs.length-1};dragState=null;
  refreshLocHighlights();
  showT('定位已添加','tok');
}
function pickKeyHandler(e){if(e.key==='Escape')cancelPickLoc();}

document.addEventListener('mousedown',e=>{if(pickingLoc){onPdfMouseDown(e);}},true);
document.addEventListener('mousemove',e=>{if(dragState)onPdfMouseMove(e);});
document.addEventListener('mouseup',e=>{if(dragState)onPdfMouseUp(e);});
document.addEventListener('click',e=>{
  if(pickingLoc)return;
  if(e.target.closest&&e.target.closest('#locDelBtn'))return;
  const locEl=e.target.closest&&e.target.closest('.loc-show');
  if(locEl){e.stopPropagation();selectLocForDelete(locEl);return;}
  if(e.target.closest&&e.target.closest('.pdf-area'))clearSelectedLoc();
});
document.addEventListener('keydown',e=>{
  if(e.target&&e.target.matches&&e.target.matches('input,textarea,[contenteditable]'))return;
  if(e.key==='Escape'){
    if(pickingLoc){cancelPickLoc();return;}
    if(selectedLocId){clearSelectedLoc();return;}
    if(activeField){activeField=null;refreshLocHighlights();return;}
  }else if(e.key==='Delete'||e.key==='Backspace'){
    if(selectedLocId){e.preventDefault();deleteSelectedLoc();}
  }
});

/* ══════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════ */
function showT(msg,type='tok'){
  const tw=document.getElementById('tw');
  const t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;
  tw.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),350);},3000);
}
</script>
<script>
/* ════════════════════════════════════════════════════════════════
   API 对接层（附加，不改动上方原 IPSC 逻辑）
   - 文献列表  ← GET /api/papers
   - 文献详情  ← GET /api/papers/:id  （AI 作为主值，AI/杨/王 三来源参与绿/红比对）
   ════════════════════════════════════════════════════════════════ */
var CURRENT_ID = null, API_SOURCES = {}, API_META = {};
const SRC_LABEL = { AI: 'AI', YANG: '杨', WANG: '王' };

// 主值 = 验收人工作值：优先「验收人终值 accepted」，否则取 AI 原值。
// 三来源（AI/杨/王）仅供对比，永不作为验收人的输入。
function mainVal(f) { return (f.accepted !== null && f.accepted !== undefined) ? f.accepted : (f.sources.AI ? f.sources.AI.value : null); }
// rid → 后端 fieldPath（cond/ev 行用列表序号对齐后端 index）
function ridToPath(rid) {
  if (rid.indexOf('cond.') === 0) { const p = rid.split('.'); const idx = STATE.conds.findIndex(c => c.uid === p[1]); return 'cond.' + idx + '.' + p.slice(2).join('.'); }
  if (rid.indexOf('ev.') === 0) { const uid = rid.slice(3); const idx = STATE.evs.findIndex(e => e.uid === uid); return 'ev.' + idx; }
  return rid;
}
// 页面值 → 后端格式（list 拼接成字符串）
function toBackendVal(v, type) {
  if (type === 'list') return Array.isArray(v) ? v.join('; ') : (v == null ? '' : String(v));
  if (type === 'score') return (v == null || v === '') ? null : Number(v);
  return v == null ? '' : String(v);
}

// 后端 list 字段是用 "; " 拼接的字符串；页面按数组渲染 tag，故还原成数组
function apiRawVal(v, type) {
  if (type === 'list') return (v == null || v === '') ? [] : String(v).split('; ');
  return v;
}
function applyTitles() {
  const lit = RAW['文献元数据'] || {};
  document.getElementById('tbTitle').textContent = lit['标题'] || '';
  document.getElementById('midDocTitle').textContent = [lit['期刊'], lit['年份'], lit['DOI']].filter(Boolean).join(' · ');
}
function resetState() {
  STATE.vals = {}; STATE.confirmed = {}; STATE.editing = {}; STATE.locs = {};
  STATE.srcExpanded = {}; STATE.evExpanded = {}; STATE.evSrcExpanded = {};
  STATE.collapsed = {}; STATE.conds = []; STATE.evs = []; _uid = 1;
}
async function loadFiles() {
  const r = await fetch('/api/papers');
  const j = await r.json();
  FILES.length = 0;
  const LIB = 'IPSC'; // 文件所属库（demo 未建库，仅展示后缀）
  (j.data || []).forEach(p => FILES.push({ id: p.id, name: (p.title || p.fileKey) + '———' + LIB, pid: 'P' + p.id, st: p.status || 'pending' }));
  if (FILES.length && CURRENT_ID == null) {
    // 刷新后恢复上次选中的文献（localStorage），不存在则回退到第一篇
    let saved = null;
    try { saved = Number(localStorage.getItem('mc_current_paper')); } catch (e) {}
    CURRENT_ID = (saved && FILES.some(f => f.id === saved)) ? saved : FILES[0].id;
  }
  renderSidebar();
}
function applyDetail(d) {
  const titleById = Object.fromEntries(SECTIONS.map(s => [s.id, s.src]));
  const newRaw = {};
  SECTIONS.forEach(s => { newRaw[s.src] = (s.type === 'object') ? {} : []; });
  API_SOURCES = {}; API_META = {};
  const rec = (fp, type, sources) => {
    API_SOURCES[fp] = ['AI', 'YANG', 'WANG'].map(k => ({ from: SRC_LABEL[k], val: norm(apiRawVal(sources[k] ? sources[k].value : null, type), type) }));
  };
  (d.sections || []).forEach(sec => {
    if (sec.type === 'object') {
      sec.fields.forEach(f => {
        const key = f.fieldPath.slice(sec.id.length + 1);
        newRaw[titleById[sec.id]][key] = apiRawVal(mainVal(f), f.type);
        rec(f.fieldPath, f.type, f.sources);
        API_META[f.fieldPath] = { confirmed: !!f.confirmed, coords: f.coords || null };
      });
    } else if (sec.type === 'array') {
      (sec.items || []).forEach(it => {
        const row = {};
        it.fields.forEach(f => {
          const key = f.fieldPath.split('.').slice(2).join('.');
          row[key] = apiRawVal(mainVal(f), f.type);
          rec(f.fieldPath, f.type, f.sources);
          API_META[f.fieldPath] = { confirmed: !!f.confirmed, coords: f.coords || null };
        });
        newRaw['培养条件'].push(row);
      });
    } else if (sec.type === 'evidence') {
      (sec.items || []).forEach(it => {
        const v = it.accepted || (it.sources.AI && it.sources.AI.value) || {};
        newRaw['证据追踪'].push({ claim: v.claim || '', evidence_sentence: v.sentence || '', source_section: v.section || '', confidence: v.confidence || '', 'figure或table': v.figure || null, extraction_note: v.note || null });
        API_META[it.fieldPath] = { confirmed: !!it.confirmed, coords: it.coords || null };
      });
    }
  });
  Object.keys(RAW).forEach(k => delete RAW[k]);
  Object.assign(RAW, newRaw);
}
async function loadPaper(id) {
  try {
    const r = await fetch('/api/papers/' + id);
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    CURRENT_ID = id;
    try { localStorage.setItem('mc_current_paper', String(id)); } catch (e) {}
    pageMode = paperMode(id);   // 按该文献的状态/历史操作决定模式（开始审核 / 提交验收 / 已完成）
    PDF_URL = (d.paper && d.paper.pdfUrl) || null;
    resetState();
    applyDetail(d);
    buildState();           // 内部会调用下面被覆写的 buildReviewSources
    applyConfirmed();       // 回填后端「已确认」状态
    loadLocs();             // 回填后端「字段坐标」到 STATE.locs
    applyTitles(); renderSidebar(); buildDoc(); updateModeUI();
  } catch (e) { console.error(e); showT('文献加载失败', 'twrn'); }
}
// 覆写：三来源取自后端（cond 行用列表序号对齐后端 index）
buildReviewSources = function () {
  REVIEW_SOURCES = {};
  Object.keys(ROW_INDEX).forEach(rid => {
    const def = ROW_INDEX[rid];
    if (def.type === 'evidence') return;
    let key = rid;
    if (def.cond) { const idx = STATE.conds.findIndex(c => c.uid === def.cond); key = 'cond.' + idx + '.' + def.fkey; }
    if (API_SOURCES[key]) {
      REVIEW_SOURCES[rid] = API_SOURCES[key].map(s => ({ from: s.from, val: clone(s.val) }));
    } else {
      const v = STATE.vals[rid] !== undefined ? STATE.vals[rid] : getCondVal(rid);
      if (v === undefined) return;
      REVIEW_SOURCES[rid] = [{ from: 'AI', val: clone(v) }, { from: '杨', val: clone(v) }, { from: '王', val: clone(v) }];
    }
  });
};
// 覆写：点击文献 → 从后端加载
selectFile = function (id) { if (id === CURRENT_ID) return; loadPaper(id); };

// 修正左侧高亮：原逻辑写死 f.id===1，这里按 CURRENT_ID 标记选中项
const _renderSidebar = renderSidebar;
renderSidebar = function () {
  _renderSidebar();
  document.querySelectorAll('#leftIcons .left-icon, #fileList .file-item').forEach(el => {
    const m = (el.getAttribute('onclick') || '').match(/selectFile\((\d+)\)/);
    el.classList.toggle('on', !!m && Number(m[1]) === CURRENT_ID);
  });
};

// 回填后端「已确认」到 STATE.confirmed
function applyConfirmed() {
  Object.keys(ROW_INDEX).forEach(rid => {
    const p = ridToPath(rid);
    if (API_META[p] && API_META[p].confirmed) STATE.confirmed[rid] = true;
  });
}

// 覆写：验收人「确认」即提交 —— 当前主值写入 FieldMeta.accepted（验收人终值）
// + confirmed=true 入库。绝不写入 AI/杨/王 三来源。
const _confirmField = confirmField;
confirmField = function (rid) {
  _confirmField(rid);                 // 原逻辑：本地置已确认并重绘
  if (CURRENT_ID == null) return;
  const def = ROW_INDEX[rid];
  let accepted;
  if (rid.indexOf('ev.') === 0) {
    const e = STATE.evs.find(x => x.uid === rid.slice(3));
    accepted = e ? { claim: e.claim, sentence: e.sentence, section: e.section, confidence: e.confidence, figure: e.figure || '', note: e.note || '' } : '';
  } else {
    accepted = toBackendVal(getVal(rid), def ? def.type : 'text');
  }
  fetch('/api/papers/' + CURRENT_ID + '/fields', {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fieldPath: ridToPath(rid), accepted: accepted, confirmed: true })
  }).then(r => { if (!r.ok) throw new Error('http ' + r.status); })
    .catch(() => showT('保存失败，请重试', 'twrn'));
};

/* ── 真实 PDF（PDF.js）+ 基于 PDF 的坐标框选 ─────────────────── */
const PDF_W = 560;                 // 渲染宽度，与 .pdf-page CSS 宽度一致
var selectedOverlay = null;
var pdfObserver = null;            // 懒加载页面的 IntersectionObserver
var PDF_URL = null;                // 当前文献的 OSS 直链（优先直连，失败回退代理）

// 覆写 buildDoc：中间面板渲染真实 PDF（来自同源代理 /api/papers/:id/pdf）
buildDoc = function () { renderPdf(CURRENT_ID); };

async function renderPdf(id) {
  const area = document.getElementById('pdfArea');
  area.style.flexDirection = 'column'; area.style.alignItems = 'center'; area.style.gap = '20px';
  if (id == null) { area.innerHTML = '<div style="padding:48px;color:var(--t3);font-size:13px">选择左侧文献以查看 PDF</div>'; return; }
  area.innerHTML = '<div style="padding:48px;color:var(--t3);font-size:13px">PDF 加载中…</div>';
  if (!window.pdfjsLib) { area.innerHTML = '<div style="padding:48px;color:var(--t3)">PDF 组件未加载</div>'; return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  if (pdfObserver) { pdfObserver.disconnect(); pdfObserver = null; }
  try {
    // disableAutoFetch：只按需用 Range 拉取被查看的页，不整文件下载。
    // 优先直连 OSS/CDN（最快，需 OSS 已配 CORS）；失败再回退同源代理。
    const opts = { disableAutoFetch: true };
    const proxyUrl = '/api/papers/' + id + '/pdf';
    let pdf;
    if (PDF_URL) {
      try {
        pdf = await pdfjsLib.getDocument(Object.assign({ url: PDF_URL }, opts)).promise;
      } catch (e) {
        console.warn('直连 OSS 失败，回退同源代理（多半是 OSS 未配 CORS）：', e && e.message);
        pdf = await pdfjsLib.getDocument(Object.assign({ url: proxyUrl }, opts)).promise;
      }
    } else {
      pdf = await pdfjsLib.getDocument(Object.assign({ url: proxyUrl }, opts)).promise;
    }
    if (id !== CURRENT_ID) return;   // 期间切换了文献，丢弃
    area.innerHTML = '';
    const dpr = window.devicePixelRatio || 1;
    // 滚动到视口附近才渲染该页
    pdfObserver = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { const w = e.target; pdfObserver.unobserve(w); renderPage(pdf, Number(w.dataset.page), w, dpr); } });
    }, { root: area, rootMargin: '800px 0px' });
    for (let n = 1; n <= pdf.numPages; n++) {
      const wrap = document.createElement('div');
      wrap.className = 'pdf-page'; wrap.dataset.page = n;
      wrap.style.cssText = 'width:' + PDF_W + 'px;min-height:' + Math.round(PDF_W * 1.3) + 'px;padding:0;position:relative;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:12px';
      wrap.textContent = '第 ' + n + ' 页';
      area.appendChild(wrap);
      pdfObserver.observe(wrap);
    }
  } catch (e) { console.error(e); area.innerHTML = '<div style="padding:48px;color:var(--red);font-size:13px">PDF 加载失败</div>'; }
}

async function renderPage(pdf, n, wrap, dpr) {
  if (wrap.dataset.rendered) return;
  wrap.dataset.rendered = '1';
  try {
    const page = await pdf.getPage(n);
    const scale = PDF_W / page.getViewport({ scale: 1 }).width;
    const vp = page.getViewport({ scale });
    wrap.textContent = ''; wrap.style.display = 'block'; wrap.style.minHeight = '0'; wrap.style.height = vp.height + 'px';
    const canvas = document.createElement('canvas');
    canvas.width = Math.floor(vp.width * dpr); canvas.height = Math.floor(vp.height * dpr);
    canvas.style.width = '100%'; canvas.style.height = '100%'; canvas.style.display = 'block';
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp, transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : undefined }).promise;
    restoreLocOverlays();
  } catch (e) { console.error(e); wrap.dataset.rendered = ''; wrap.textContent = '第 ' + n + ' 页加载失败'; }
}

// 回填后端字段坐标到 STATE.locs（按 rid）
function loadLocs() {
  STATE.locs = {};
  Object.keys(ROW_INDEX).forEach(rid => {
    const c = (API_META[ridToPath(rid)] || {}).coords;
    if (Array.isArray(c) && c.length) STATE.locs[rid] = c.map(o => ({ page: +o.page || 1, x: +o.x || 0, y: +o.y || 0, w: +o.w || 0, h: +o.h || 0 }));
  });
}
// 覆写坐标存取：直接用 STATE.locs 里的坐标对象数组（不再依赖示意文本锚点）
ensureLocs = function (rid) { if (!Array.isArray(STATE.locs[rid])) STATE.locs[rid] = []; return STATE.locs[rid]; };
getLocsFor = function (rid) { return ensureLocs(rid); };

function restoreLocOverlays() {
  document.querySelectorAll('#pdfArea .loc-overlay').forEach(el => el.remove());
  Object.keys(STATE.locs).forEach(rid => {
    (STATE.locs[rid] || []).forEach((c, i) => {
      const pg = document.querySelector('.pdf-page[data-page="' + (c.page || 1) + '"]'); if (!pg) return;
      const o = document.createElement('div');
      o.className = 'loc-overlay loc-show'; o.dataset.rid = rid; o.dataset.idx = i;
      o.style.left = (c.x * 100) + '%'; o.style.top = (c.y * 100) + '%'; o.style.width = (c.w * 100) + '%'; o.style.height = (c.h * 100) + '%';
      pg.appendChild(o);
    });
  });
}
function persistCoords(rid) {
  if (CURRENT_ID == null) return;
  const path = ridToPath(rid);
  const coords = getLocsFor(rid).slice();
  (API_META[path] || (API_META[path] = {})).coords = coords;
  fetch('/api/papers/' + CURRENT_ID + '/fields', {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fieldPath: path, coords: coords.length ? coords : null })
  }).then(r => { if (!r.ok) throw new Error('http ' + r.status); }).catch(() => showT('坐标保存失败', 'twrn'));
}

// 框选交互（覆写原文本锚点版本）
onLocAddClick = function (ev, rid) {
  ev.stopPropagation();
  if (isLocReadonly()) return;
  if (pickingLoc) { cancelPickLoc(); return; }
  pickingLoc = { rid };
  document.body.classList.add('picking-loc');
  document.addEventListener('keydown', pickKeyHandler);
};
onLocCycle = function (ev, rid) {
  ev.stopPropagation();
  if (pickingLoc) { cancelPickLoc(); return; }
  if (!getLocsFor(rid).length) return;
  document.querySelectorAll('#pdfArea .loc-show-current').forEach(el => el.classList.remove('loc-show-current'));
  const o = document.querySelector('#pdfArea .loc-overlay[data-rid="' + CSS.escape(rid) + '"]');
  if (o) { o.classList.add('loc-show-current'); o.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
};
onPdfMouseDown = function (e) {
  if (!pickingLoc) return;
  const pg = e.target.closest && e.target.closest('.pdf-page'); if (!pg) return;
  e.preventDefault(); e.stopPropagation();
  const pr = pg.getBoundingClientRect();
  const sx = e.clientX - pr.left, sy = e.clientY - pr.top;
  const r = document.createElement('div'); r.className = 'pdf-drag-rect';
  r.style.cssText = 'left:' + sx + 'px;top:' + sy + 'px;width:0;height:0';
  pg.appendChild(r);
  dragState = { page: pg, startX: sx, startY: sy, rect: r };
};
onPdfMouseMove = function (e) {
  if (!dragState) return;
  const pr = dragState.page.getBoundingClientRect();
  const cx = e.clientX - pr.left, cy = e.clientY - pr.top;
  Object.assign(dragState.rect.style, { left: Math.min(dragState.startX, cx) + 'px', top: Math.min(dragState.startY, cy) + 'px', width: Math.abs(cx - dragState.startX) + 'px', height: Math.abs(cy - dragState.startY) + 'px' });
};
onPdfMouseUp = function () {
  if (!dragState) return;
  const r = dragState.rect, pg = dragState.page;
  const pw = pg.clientWidth, ph = pg.clientHeight;
  const left = parseFloat(r.style.left) || 0, top = parseFloat(r.style.top) || 0, w = parseFloat(r.style.width) || 0, h = parseFloat(r.style.height) || 0;
  r.remove();
  const rid = pickingLoc ? pickingLoc.rid : null;
  dragState = null; pickingLoc = null;
  document.body.classList.remove('picking-loc'); document.removeEventListener('keydown', pickKeyHandler);
  if (!rid || w < 8 || h < 8) return;
  getLocsFor(rid).push({ page: Number(pg.dataset.page) || 1, x: left / pw, y: top / ph, w: w / pw, h: h / ph });
  restoreLocOverlays(); persistCoords(rid); renderBody();
  showT('定位已添加', 'tok');
};
// 选中/删除某个坐标框（点 × 或按 Delete）
selectLocForDelete = function (el) {
  if (!el || !el.classList || !el.classList.contains('loc-overlay')) return;
  clearSelectedLoc();
  selectedOverlay = el; selectedLocId = 'sel';
  el.classList.add('loc-selected'); showLocDelBtn(el);
};
clearSelectedLoc = function () {
  if (selectedOverlay) selectedOverlay.classList.remove('loc-selected');
  selectedOverlay = null; selectedLocId = null; removeLocDelBtn();
};
deleteSelectedLoc = function () {
  if (!selectedOverlay) return;
  const rid = selectedOverlay.dataset.rid, idx = Number(selectedOverlay.dataset.idx);
  const arr = getLocsFor(rid);
  if (idx >= 0 && idx < arr.length) arr.splice(idx, 1);
  selectedOverlay = null; selectedLocId = null; removeLocDelBtn();
  restoreLocOverlays(); persistCoords(rid); renderBody();
  showT('定位已删除', 'tinf');
};

window.addEventListener('DOMContentLoaded', async () => {
  // 恢复列表栏的展开/收缩状态
  try { leftOpen = localStorage.getItem('mc_left_open') === '1'; } catch (e) {}
  applyLeftState();
  try { await loadFiles(); if (FILES.length) await loadPaper(CURRENT_ID); }
  catch (e) { console.error(e); showT('列表加载失败', 'twrn'); }
});
</script>
