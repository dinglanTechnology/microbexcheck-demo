name: builder

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "部署环境（dev / dev1 可选任意分支或 tag；prod 必须选 v* 开头的 tag 运行；留 none 则按旧规则：develop→dev、develop1→dev1）"
        type: choice
        default: none
        options:
          - none
          - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # 生产部署的前置校验：必须在 Run workflow 的下拉框里选择 v* 开头的 tag（而不是分支）
      - name: Validate prod deploy ref
        if: inputs.environment == 'prod' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "::error::生产部署必须选择 v* 开头的 tag 运行（当前 ref：${{ github.ref }}）。请先打 tag（如 v1.1.0）再触发。"
          exit 1

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/dinglan-backend/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
          # tag 事件默认会追加 :latest（latest=auto），导致 outputs.tags 变多行，关掉
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image URL
        run: echo "Image pushed - ${{ steps.meta.outputs.tags }}"

      - name: Get Jenkins CRUMB
        id: get-crumb
        run: |
          CRUMB=$(curl -s -u ${{ secrets.JENKINS_USERNAME }}:${{ secrets.JENKINS_API_TOKEN }} \
            "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" | jq -r .crumb)
          echo "crumb=$CRUMB" >> "$GITHUB_OUTPUT"

      # main 环境：选了 environment=main 时部署当前所选分支；未选（none）时保持旧行为——仅 main 分支自动部署
      - name: Notify Jenkins dev (develop 环境)
        if: inputs.environment == 'dev' || (inputs.environment == 'none' && github.ref == 'refs/heads/develop')
        env:
          CRUMB: ${{ steps.get-crumb.outputs.crumb }}
        run: |
          # 取 metadata 输出的第一个镜像地址（已做小写化；flavor latest=false 保证只有这一个）
          IMAGE_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          curl -X POST \
            -H "Jenkins-Crumb: $CRUMB" \
            -u ${{ secrets.JENKINS_USERNAME }}:${{ secrets.JENKINS_API_TOKEN }} \
            "${{ secrets.JENKINS_URL }}/job/microbexcheck-demo/buildWithParameters" \
            --data token=${{ secrets.JENKINS_BUILD_TOKEN }} \
            --data IMAGE_TAG="${IMAGE_TAG}"